{{- if .Values.kuadrant.create }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: rhcl-bootstrap-scripts
  namespace: {{ .Values.kuadrant.namespace }}
  labels:
    {{- include "rhcl.labels" . | nindent 4 }}
data:
{{ tpl (.Files.Glob "files/*").AsConfig $ | indent 2 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: restart-kuadrant-operator-script
  namespace: {{ .Values.kuadrant.namespace }}
  labels:
    {{- include "rhcl.labels" . | nindent 4 }}
data:
  restart-kuadrant-operator.sh: |
{{ .Files.Get "files/restart-kuadrant-operator.sh" | indent 4 }}
{{- end }}
