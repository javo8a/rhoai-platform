{{- range $name, $gw := .Values.gateways }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $name }}
  {{- with $gw.namespace }}
  namespace: {{ . }}
  {{- end }}
  {{- with $gw.metadata }}
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- end }}
spec:
  gatewayClassName: {{ $gw.gatewayClassName }}
  {{- if and $.Values.disconnected.enabled $.Values.disconnected.gatewayConfig.wasmInsecureRegistries }}
  infrastructure:
    parametersRef:
      group: ""
      kind: ConfigMap
      name: {{ $.Values.disconnected.gatewayConfig.name }}
  {{- end }}
  listeners:
    {{- range $lname, $listener := $gw.listeners }}
    - name: {{ $lname }}
      hostname: {{ tpl $listener.hostname $ | quote }}
      port: {{ $listener.port }}
      protocol: {{ $listener.protocol }}
      {{- with $listener.tls }}
      tls:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      allowedRoutes:
      {{- if $listener.allowedRoutes }}
        {{- toYaml $listener.allowedRoutes | nindent 8 }}
      {{- else }}
        namespaces:
          from: All
      {{- end }}
    {{- end }}
{{- end }}
