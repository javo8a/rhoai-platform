---
global:
  toolsImage: image-registry.openshift-image-registry.svc:5000/openshift/tools:latest
  cluster:
    name: cluster
    baseDomain: example.com

install-rhoai:
  enabled: true
  operators:
    rhods-operator:
      channel: stable-3.x
      installPlanApproval: Manual
      namespace: redhat-ods-operator
      startingCSV: rhods-operator.3.4.0
      operatorGroup:
        enabled: true

rbac:
  create: true
  group: system:authenticated:oauth

mcpServers: {}

gateways:
  # Gateway maas-default-gateway is owned by the gateway-api chart (sync wave 3).
  # Set create: true only when openshift-ai should manage the Gateway instead.
  maasDefaultGateway:
    create: false
    useRoute: false
    certificate:
      create: false
  openshiftAiInference:
    create: false

enableUserTelemetry: false

dashboardReplicas: null
operatorReplicas: null

dataScienceCluster:
  create: true
  version: v2
  components:
    kserve:
      managementState: Managed
      defaultDeploymentMode: RawDeployment
      nim:
        managementState: Managed
      rawDeploymentServiceConfig: Headless
      serving:
        ingressGateway:
          certificate:
            type: OpenshiftDefaultIngress
        managementState: Removed
        name: knative-serving
      modelsAsService:
        managementState: Managed
    modelregistry:
      managementState: Managed
      registriesNamespace: rhoai-model-registries
    feastoperator:
      managementState: Removed
    trustyai:
      eval:
        lmeval:
          permitCodeExecution: deny
          permitOnline: deny
      managementState: Managed
    aipipelines:
      argoWorkflowsControllers:
        managementState: Managed
      managementState: Removed
    ray:
      managementState: Removed
    kueue:
      defaultClusterQueueName: default
      defaultLocalQueueName: default
      managementState: Removed
    workbenches:
      managementState: Managed
      workbenchNamespace: rhods-notebooks
    mlflowoperator:
      managementState: Removed
    dashboard:
      managementState: Managed
    trainer:
      managementState: Removed
    llamastackoperator:
      managementState: Managed
    trainingoperator:
      managementState: Removed

dataScienceClusterInitialization:
  applicationsNamespace: redhat-ods-applications
  monitoring:
    managementState: Managed
    namespace: redhat-ods-monitoring
    alerting: {}
    metrics:
      replicas: 1
      storage:
        size: 5Gi
        retention: 90d
      exporters: {}
    traces:
      sampleRatio: "0.1"
      storage:
        backend: pv
        retention: 2160h
      exporters: {}
  trustedCABundle:
    customCABundle: ""
    managementState: Managed

clusterMonitoring:
  enabled: true

maasAuthorinoNetworkPolicy:
  enabled: true

hardwareProfiles: {}

admins: []
userGroups:
  - system:authenticated

dashboardConfig:
  modelAsService: true
  genAiStudio: true
  observabilityDashboard: true
  vLLMDeploymentOnMaaS: true
  maasAuthPolicies: true

defaultWorkbenchPvcSize: 20Gi
showJupyterInEnabledApplications: true
notebookIdleCulling:
  enabled: true
  timeoutInMinutes: 240

mlflow:
  create: false

evalhub:
  create: false

# bootstrap.sh: restart rhods-dashboard after OdhDashboardConfig changes
dashboardRestart:
  enabled: true
  deploymentName: rhods-dashboard
