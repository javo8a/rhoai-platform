---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: maas-workloads
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: maas-workloads
  destination:
    name: in-cluster
    namespace: openshift-gitops
  source:
    path: applications/clusters/cluster-6bmxk.6bmxk.sandbox5237.opentlc.com/workloads
    repoURL: https://github.com/javo8a/rhoai-platform.git
    targetRevision: main
    directory:
      recurse: false
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
