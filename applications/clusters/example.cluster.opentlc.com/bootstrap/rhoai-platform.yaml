---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rhoai-platform
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: rhoai-platform
  destination:
    name: in-cluster
    namespace: openshift-gitops
  source:
    path: applications/clusters/example.cluster.opentlc.com/platform
    repoURL: https://github.com/javo8a/rhoai-platform.git
    targetRevision: main
    directory:
      recurse: false
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
