---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rhoai-maas-bootstrap
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rhoai-platform
  destination:
    name: in-cluster
    namespace: openshift-gitops
  source:
    path: applications/clusters/cluster-8h7g4.8h7g4.sandbox966.opentlc.com/bootstrap
    repoURL: https://github.com/javo8a/rhoai-platform.git
    targetRevision: main
    directory:
      recurse: false
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
