global:
  cluster:
    name: cluster-updateme
    baseDomain: opentlc.com
  toolsImage: image-registry.openshift-image-registry.svc:5000/openshift/tools:latest

# Disconnected cluster workarounds (bootstrap.sh step 11 + default-gateway-config).
# Update registry and image URLs for your internal artifactory. Omit this block on connected clusters.
disconnected:
  enabled: true
  wasmShimImage: registry.customer.com/rhcl-1/wasm-shim-rhel9@sha256:4b8cd7dea4d9cd3c7170af872c229e206155691e7dbb4a90c64699ccecc7ccbb
  protectedRegistry: registry.customer.com
  gatewayConfig:
    wasmInsecureRegistries: registry.customer.com
    serviceType: ClusterIP

# MaaS PostgreSQL: deploy in-cluster for sandbox/POC; use external day2-managed DB in production.
maas:
  postgres:
    deploy:
      enabled: true
    dbConfig:
      secretName: maas-db-config
      # Production example (deploy.enabled: false):
      # existingSecret: maas-db-config
      # Or reference a credentials secret and connection endpoints:
      # credentialsSecret: maas-postgres-credentials
      # host: postgres.production.example.com
      # port: 5432
      # database: maas
      # user: maas
      # passwordKey: password
      # sslmode: require
